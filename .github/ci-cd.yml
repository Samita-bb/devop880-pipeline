name: React App CI/CD 

# Workflow จะทำงานเมื่อมีการ Push ไปที่ branch 'main'
on: 
  push: 
    branches:
      - main 

jobs: 
  build-and-push-docker-image: 
    runs-on: ubuntu-latest 
    steps: 
      - name: Checkout code 
        uses: actions/checkout@v4 
      
      - name: Set up Docker Buildx 
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub 
        uses: docker/login-action@v3 
        with: 
          username: ${{ secrets.DOCKER_USERNAME }} 
          password: ${{ secrets.DOCKER_PASSWORD }} 
      
      - name: Build and push Docker image 
        uses: docker/build-push-action@v5 
        with: 
          context: . 
          push: true 
          # ใช้ชื่อ samitabb (ตัวพิมพ์เล็ก) เป็นมาตรฐาน
          tags: samitabb/devop880-pipeline:latest 
      
  deploy: 
    needs: build-and-push-docker-image 
    runs-on: ubuntu-latest 
    steps: 
      - name: Deploy to Server via SSH 
        uses: appleboy/ssh-action@v1.0.3 
        with: 
          host: ${{ secrets.SERVER_HOST }} 
          username: ${{ secrets.SERVER_USER }} 
          key: ${{ secrets.SERVER_SSH_KEY }} 
          port: 22
          script: | 
            # 1. ดึง Image ล่าสุดลงมา
            docker pull samitabb/devop880-pipeline:latest
            
            # 2. หยุดและลบ Container เดิม (ถ้ามี) โดยไม่ทำให้ Workflow พังถ้าไม่เจอ Container
            docker stop my-react-app || true 
            docker rm my-react-app || true 
            
            # 3. รัน Container ใหม่
            docker run -d --name my-react-app -p 80:80 samitabb/devop880-pipeline:latest
            
            # 4. ลบ Image เก่าๆ ที่ไม่ได้ใช้เพื่อประหยัดพื้นที่เซิร์ฟเวอร์
            docker image prune -f
